[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints
    slow: Slow running tests (vector operations, large datasets)
    security: Security-focused tests (path traversal, encryption, etc.)
addopts =
    -v
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --strict-markers
    --tb=short
