name: Latest Dependency Check

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  latest-cargo-deps:
    name: Latest Cargo Dependencies
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Exercise latest Cargo dependency graph
        id: latest
        continue-on-error: true
        run: |
          mkdir -p frontend/dist
          echo '<html></html>' > frontend/dist/index.html

          cd frontend/src-tauri
          cargo update

          cd ..
          node scripts/prepare-sidecar.cjs --release --target x86_64-unknown-linux-gnu

          cd src-tauri
          cargo test
          cargo build --release --target x86_64-unknown-linux-gnu --bin grafyn
          cargo build --release --target x86_64-unknown-linux-gnu --bin grafyn-mcp --no-default-features --features mcp

      - name: Latest dependency summary
        if: always()
        run: |
          echo "## Latest dependency check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Latest Cargo Dependencies | ${{ steps.latest.outcome }} |" >> $GITHUB_STEP_SUMMARY
