name: Latest Dependency Check

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  latest-cargo-deps:
    name: Latest Cargo Deps (Rust ${{ matrix.rust }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: '1.93.1'
            label: pinned
          - rust: stable
            label: stable

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Exercise latest Cargo dependency graph
        id: latest
        continue-on-error: true
        run: |
          mkdir -p frontend/dist
          echo '<html></html>' > frontend/dist/index.html

          cd frontend/src-tauri
          cargo update

          cd ..
          node scripts/prepare-sidecar.cjs --release --target x86_64-unknown-linux-gnu

          cd src-tauri
          cargo test
          cargo build --release --target x86_64-unknown-linux-gnu --bin grafyn
          cargo build --release --target x86_64-unknown-linux-gnu --bin grafyn-mcp --no-default-features --features mcp

  summary:
    name: Dependency Check Summary
    runs-on: ubuntu-latest
    needs: [latest-cargo-deps]
    if: always()
    steps:
      - name: Latest dependency summary
        run: |
          echo "## Latest dependency check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Rust toolchain | Outcome |" >> $GITHUB_STEP_SUMMARY
          echo "|----------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Overall | ${{ needs.latest-cargo-deps.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Pinned (1.93.1) failures = real problems. Stable failures = forward-compatibility signal (Rust 1.94+ breaks wry 0.24.x)." >> $GITHUB_STEP_SUMMARY
