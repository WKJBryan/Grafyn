name: Test Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_CACHE_VERSION: v1

jobs:
  # ============================================================================
  # Tier 1: On every push (fast, <5min)
  # ============================================================================

  release-preflight:
    name: Release Preflight
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: dtolnay/rust-toolchain@1.93.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
          key: ${{ runner.os }}-release-preflight-1.93.1-${{ hashFiles('frontend/src-tauri/Cargo.lock', '.github/workflows/test.yml') }}-${{ env.RUST_CACHE_VERSION }}

      - name: Validate release manifests and lockfile
        run: cd frontend && npm run release:verify

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.93.1

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
          key: ${{ runner.os }}-ubuntu2204-1.93.1-${{ hashFiles('frontend/src-tauri/Cargo.lock', '.github/workflows/test.yml') }}-${{ env.RUST_CACHE_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Prepare build artifacts for Tauri
        run: |
          # Tauri's generate_context!() requires distDir to exist at compile time
          mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html
          cd frontend
          # Tauri's build script requires the MCP external binary
          node scripts/prepare-sidecar.cjs

      - name: Run Rust tests
        run: cd frontend/src-tauri && cargo test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:run

  # linux-desktop-build removed — release-smoke.yml covers Linux builds on every PR/push

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
          key: ${{ runner.os }}-ubuntu2204-clippy-1.93.1-${{ hashFiles('frontend/src-tauri/Cargo.lock', '.github/workflows/test.yml') }}-${{ env.RUST_CACHE_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend linting
        run: cd frontend && npm run lint

      - name: Run Rust clippy
        run: cd frontend/src-tauri && cargo clippy --all-targets -- -D warnings
        continue-on-error: true  # TODO: fix 26 pre-existing warnings, then remove this

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit
        run: cd frontend && npm audit --audit-level=high

  # ============================================================================
  # Build Check
  # ============================================================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

  # ============================================================================
  # Summary
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [release-preflight, rust-tests, frontend-tests, lint, security, build]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Release Preflight | ${{ needs.release-preflight.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Tests | ${{ needs.rust-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
