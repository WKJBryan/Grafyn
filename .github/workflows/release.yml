name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Create Release - Single job to avoid duplicate drafts from matrix race
  # ============================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      release_notes: ${{ steps.notes.outputs.notes }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes from commits
        id: notes
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;

            // Find the previous tag for the changelog range
            let previousTag = '';
            try {
              const { data: tags } = await github.rest.repos.listTags({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
              });
              const currentIdx = tags.findIndex(t => t.name === tag);
              if (currentIdx >= 0 && currentIdx + 1 < tags.length) {
                previousTag = tags[currentIdx + 1].name;
              } else if (tags.length > 1) {
                // Tag not yet in list (just pushed), use second tag as previous
                previousTag = tags[0].name === tag ? tags[1]?.name : tags[0].name;
              }
            } catch (e) {
              core.info(`Could not find previous tag: ${e.message}`);
            }

            // Generate changelog using GitHub's release notes API
            let changelog = '';
            try {
              const params = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
              };
              if (previousTag) params.previous_tag_name = previousTag;

              const { data } = await github.rest.repos.generateReleaseNotes(params);
              changelog = data.body;
            } catch (e) {
              core.warning(`Could not generate release notes: ${e.message}`);
              changelog = `Release ${tag}`;
            }

            // Also produce a plain-text summary for the updater dialog
            // Extract just the commit lines (strip markdown headers/formatting)
            const lines = changelog.split('\n');
            const commitLines = lines
              .filter(l => l.startsWith('* '))
              .map(l => l
                .replace(/\* /, '- ')
                .replace(/ by @[\w-]+ in .+$/, '')  // strip "by @user in URL"
                .replace(/\*\*/g, '')                // strip bold markers
              )
              .slice(0, 15);  // cap at 15 entries for the dialog

            const updaterNotes = commitLines.length > 0
              ? commitLines.join('\n')
              : `Release ${tag}`;

            core.setOutput('notes', updaterNotes);
            core.setOutput('changelog', changelog);

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG: ${{ steps.notes.outputs.changelog }}
        with:
          script: |
            const changelog = process.env.CHANGELOG || '';
            const body = [
              changelog,
              '',
              '---',
              '',
              '## Download',
              '',
              '| Platform | File | Notes |',
              '|----------|------|-------|',
              '| **Windows (64-bit)** | `Grafyn_*_x64-setup.exe` | Most Windows PCs |',
              '| **Windows (ARM)** | `Grafyn_*_arm64-setup.exe` | Surface Pro X, Snapdragon laptops |',
              '| **macOS** | `Grafyn_*_aarch64.dmg` | M1/M2/M3/M4 Macs (also runs on Intel via Rosetta 2) |',
              '| **Linux (Debian/Ubuntu)** | `Grafyn_*_amd64.deb` | `sudo dpkg -i` to install |',
              '| **Linux (Universal)** | `Grafyn_*_amd64.AppImage` | `chmod +x` and run — works on any distro |',
              '',
              '> **Already installed?** Grafyn will prompt you to update automatically.',
              '>',
              '> Files ending in `.sig`, `.zip`, or `latest.json` are for auto-update — you don\'t need to download those.',
            ].join('\n');

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${process.env.VERSION}`,
              name: `Grafyn v${process.env.VERSION}`,
              body,
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ============================================================================
  # Build Matrix - All Platforms & Architectures
  # ============================================================================
  build:
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || !startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            os_name: windows
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
            os_name: windows

          # macOS (ARM only — Rosetta 2 handles x64 on Apple Silicon)
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            os_name: macos

          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            os_name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========================================
      # Setup Node.js
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ========================================
      # Setup Rust
      # ========================================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'
          key: ${{ matrix.target }}

      # ========================================
      # Install Linux Dependencies
      # ========================================
      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ========================================
      # Install macOS Dependencies (for cross-compile)
      # ========================================
      - name: Install macOS cross-compile tools
        if: matrix.os_name == 'macos' && matrix.arch == 'arm64'
        run: |
          # ARM64 builds on Intel Mac need no extra setup with recent Xcode
          echo "Building for Apple Silicon on macOS"

      # ========================================
      # Install Frontend Dependencies
      # ========================================
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ========================================
      # Validate Icons (regenerate if invalid)
      # ========================================
      - name: Validate and regenerate icons
        working-directory: frontend
        shell: bash
        run: |
          # Check icon.ico exists and has valid Windows icon magic bytes
          # Uses Node.js exit code directly — no temp files needed
          if node -e "
            const fs = require('fs');
            const ico = 'src-tauri/icons/icon.ico';
            if (!fs.existsSync(ico)) process.exit(1);
            const magic = fs.readFileSync(ico).slice(0, 4).toString('hex');
            console.log('icon.ico magic: ' + magic);
            if (magic !== '00000100') process.exit(1);
          "; then
            echo "Icons are valid"
          else
            echo "Regenerating icons..."
            node scripts/generate-icons.cjs
            npx tauri icon src-tauri/icons/app-icon.png
          fi

      # ========================================
      # Build MCP Binary (native Rust, no Tauri)
      # ========================================
      - name: Build MCP binary
        working-directory: frontend/src-tauri
        shell: bash
        run: |
          EXT=""
          if [[ "${{ matrix.os_name }}" == "windows" ]]; then
            EXT=".exe"
          fi
          cargo build --release --bin grafyn-mcp --no-default-features --features mcp --target ${{ matrix.target }}
          mkdir -p binaries
          cp "target/${{ matrix.target }}/release/grafyn-mcp${EXT}" "binaries/grafyn-mcp-${{ matrix.target }}${EXT}"
          echo "Built grafyn-mcp for ${{ matrix.target }}"

      # ========================================
      # Build Tauri App & Upload to Release
      # ========================================
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ''
          GITHUB_FEEDBACK_REPO: ${{ secrets.FEEDBACK_REPO }}
          GITHUB_FEEDBACK_TOKEN: ${{ secrets.FEEDBACK_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseBody: ${{ needs.create-release.outputs.release_notes }}
          updaterJsonPreferNsis: true

      # ========================================
      # Upload Artifacts (for workflow_dispatch debugging only)
      # ========================================
      - name: Upload Windows installers
        if: matrix.os_name == 'windows' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 7
          if-no-files-found: warn

      - name: Upload macOS installers
        if: matrix.os_name == 'macos' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Linux installers
        if: matrix.os_name == 'linux' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # Publish Release - Mark draft as published after all builds complete
  # ============================================================================
  publish-release:
    needs: [create-release, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: parseInt(process.env.RELEASE_ID),
              draft: false,
            });

  # ============================================================================
  # Upload to Cloudflare R2 (for auto-update distribution)
  # ============================================================================
  upload-to-r2:
    needs: [build, publish-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          cd release-assets

          # Download all assets from the GitHub Release
          gh release download "${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "*" \
            || echo "Some assets may not be available yet"

          echo "Downloaded assets:"
          ls -la

      - name: Rewrite latest.json URLs
        env:
          WORKER_URL: ${{ vars.CLOUDFLARE_WORKER_URL || 'https://grafyn-updater.grafyn-updater.workers.dev' }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -f release-assets/latest.json ]; then
            echo "Original latest.json:"
            cat release-assets/latest.json

            # Rewrite GitHub URLs to Worker download URLs
            # Format 1: /releases/download/<tag>/<filename> (tag-specific URLs)
            sed -i "s|https://github.com/[^/]*/[^/]*/releases/download/[^/]*/|${WORKER_URL}/download/${VERSION}/|g" release-assets/latest.json
            # Format 2: /releases/latest/download/<filename> (latest-redirect URLs from tauri-action)
            sed -i "s|https://github.com/[^/]*/[^/]*/releases/latest/download/|${WORKER_URL}/download/${VERSION}/|g" release-assets/latest.json

            echo ""
            echo "Rewritten latest.json:"
            cat release-assets/latest.json

            # Verify no GitHub download URLs leaked through
            if grep -q 'github.com.*releases.*download' release-assets/latest.json; then
              echo "ERROR: latest.json still contains GitHub download URLs after rewrite!"
              echo "Unrewritten URLs:"
              grep -o 'https://github.com[^"]*' release-assets/latest.json
              exit 1
            fi
          else
            echo "WARNING: latest.json not found in release assets"
          fi

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          npm i -g wrangler@3

          upload_with_retry() {
            local file="$1"
            local key="$2"
            local content_type="${3:-}"
            local max_attempts=3
            local attempt=1
            local delay=5

            while [ $attempt -le $max_attempts ]; do
              echo "  Attempt $attempt/$max_attempts..."
              local ct_flag=""
              if [ -n "$content_type" ]; then
                ct_flag="--content-type $content_type"
              fi
              if wrangler r2 object put "$key" --file "$file" --remote $ct_flag 2>&1; then
                echo "  Upload complete."
                return 0
              fi
              echo "  Failed. Retrying in ${delay}s..."
              sleep $delay
              delay=$((delay * 3))
              attempt=$((attempt + 1))
            done
            echo "  ERROR: Failed after $max_attempts attempts"
            return 1
          }

          # Upload latest.json first (if it exists)
          if [ -f release-assets/latest.json ]; then
            echo "Uploading latest.json..."
            upload_with_retry release-assets/latest.json grafyn-releases/latest.json application/json
          fi

          # Upload all other assets into versioned directory
          for file in release-assets/*; do
            filename=$(basename "$file")
            if [ "$filename" != "latest.json" ]; then
              echo "Uploading $filename..."
              upload_with_retry "$file" "grafyn-releases/$VERSION/$filename"
            fi
          done
          echo "Upload complete!"

      - name: Verify R2 upload
        env:
          WORKER_URL: ${{ vars.CLOUDFLARE_WORKER_URL || 'https://grafyn-updater.grafyn-updater.workers.dev' }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          EXPECTED_VERSION="${VERSION#v}"

          # Curl the actual Worker endpoint — the same URL Tauri's updater hits.
          # This catches account-ID mismatches that wrangler read-back would miss
          # (since wrangler would read from the same wrong bucket it uploaded to).
          sleep 5  # allow R2 propagation
          UPLOADED_VERSION=$(curl -sf "${WORKER_URL}/latest.json" | jq -r '.version')

          if [ "$UPLOADED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::R2 latest.json version mismatch! Expected $EXPECTED_VERSION but Worker serves $UPLOADED_VERSION. The CLOUDFLARE_ACCOUNT_ID secret likely points to the wrong account."
            exit 1
          fi
          echo "R2 verified: Worker serves latest.json version = $UPLOADED_VERSION"

  # ============================================================================
  # Summary
  # ============================================================================
  build-summary:
    needs: [create-release, build, publish-release, upload-to-r2]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | x64 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ARM64 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ARM64 (Apple Silicon) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | x64 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab or the Release page." >> $GITHUB_STEP_SUMMARY
