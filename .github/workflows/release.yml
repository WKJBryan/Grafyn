name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # Build Matrix - All Platforms & Architectures
  # ============================================================================
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            os_name: windows
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
            os_name: windows

          # macOS
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x64
            os_name: macos
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            os_name: macos

          # Linux
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            os_name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ========================================
      # Setup Node.js
      # ========================================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # ========================================
      # Setup Rust
      # ========================================
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'
          key: ${{ matrix.target }}

      # ========================================
      # Install Linux Dependencies
      # ========================================
      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ========================================
      # Install macOS Dependencies (for cross-compile)
      # ========================================
      - name: Install macOS cross-compile tools
        if: matrix.os_name == 'macos' && matrix.arch == 'arm64'
        run: |
          # ARM64 builds on Intel Mac need no extra setup with recent Xcode
          echo "Building for Apple Silicon on macOS"

      # ========================================
      # Install Frontend Dependencies
      # ========================================
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ========================================
      # Generate Icons (if missing)
      # ========================================
      - name: Generate app icons
        working-directory: frontend
        run: |
          if [ ! -f "src-tauri/icons/icon.ico" ]; then
            echo "Generating placeholder icons..."
            node scripts/generate-icons.cjs
          else
            echo "Icons already exist"
          fi
        shell: bash

      # ========================================
      # Build Tauri App & Create Release
      # ========================================
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ''
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --config '{"tauri":{"bundle":{"externalBin":[]}}}'
          tagName: v__VERSION__
          releaseName: 'Grafyn v__VERSION__'
          releaseBody: |
            See the assets below to download and install.

            **Auto-update:** If you already have Grafyn installed, the app will prompt you to update automatically.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true

      # ========================================
      # Upload Artifacts (for workflow_dispatch debugging only)
      # ========================================
      - name: Upload Windows installers
        if: matrix.os_name == 'windows' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          retention-days: 7
          if-no-files-found: warn

      - name: Upload macOS installers
        if: matrix.os_name == 'macos' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Linux installers
        if: matrix.os_name == 'linux' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # Upload to Cloudflare R2 (for auto-update distribution)
  # ============================================================================
  upload-to-r2:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          cd release-assets

          # Download all assets from the GitHub Release
          gh release download "${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "*" \
            || echo "Some assets may not be available yet"

          echo "Downloaded assets:"
          ls -la

      - name: Rewrite latest.json URLs
        env:
          WORKER_URL: ${{ vars.CLOUDFLARE_WORKER_URL || 'https://grafyn-updater.grafyn-updater.workers.dev' }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ -f release-assets/latest.json ]; then
            echo "Original latest.json:"
            cat release-assets/latest.json

            # Rewrite GitHub URLs to Worker download URLs
            # Matches: https://github.com/<owner>/<repo>/releases/download/<tag>/<filename>
            sed -i "s|https://github.com/[^/]*/[^/]*/releases/download/[^/]*/|${WORKER_URL}/download/${VERSION}/|g" release-assets/latest.json

            echo ""
            echo "Rewritten latest.json:"
            cat release-assets/latest.json
          else
            echo "WARNING: latest.json not found in release assets"
          fi

      - name: Upload to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            r2 object put grafyn-releases/latest.json --file release-assets/latest.json --content-type application/json 2>/dev/null || true
            for file in release-assets/*; do
              filename=$(basename "$file")
              if [ "$filename" != "latest.json" ]; then
                echo "Uploading $filename..."
                r2 object put "grafyn-releases/${{ steps.version.outputs.version }}/$filename" --file "$file" 2>/dev/null || true
              fi
            done
            echo "Upload complete!"

  # ============================================================================
  # Summary
  # ============================================================================
  build-summary:
    needs: [build, upload-to-r2]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | x64 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ARM64 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | x64 (Intel) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ARM64 (Apple Silicon) | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | x64 | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the Actions tab or the Release page." >> $GITHUB_STEP_SUMMARY
