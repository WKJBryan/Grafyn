name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build all platforms but skip publish and R2 upload'
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_CACHE_VERSION: v1

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release
    outputs:
      created_new: ${{ steps.ensure_release.outputs.created_new }}
      release_id: ${{ steps.ensure_release.outputs.release_id }}
      release_notes: ${{ steps.notes.outputs.notes }}
      tag_name: ${{ github.ref_name }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.100.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri
          key: ${{ runner.os }}-release-prepare-1.93.1-${{ hashFiles('frontend/src-tauri/Cargo.lock', '.github/workflows/release.yml') }}-${{ env.RUST_CACHE_VERSION }}

      - name: Validate release manifests
        working-directory: frontend
        run: npm run release:verify

      - name: Read version from manifests
        id: version
        working-directory: frontend
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches manifests
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          expected_tag="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "$expected_tag" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${expected_tag}"
            exit 1
          fi

      - name: Generate release notes
        if: ${{ !inputs.dry_run }}
        id: notes
        uses: actions/github-script@v8
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;

            let previousTag = '';
            try {
              const { data: tags } = await github.rest.repos.listTags({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 10,
              });
              const currentIdx = tags.findIndex(t => t.name === tag);
              if (currentIdx >= 0 && currentIdx + 1 < tags.length) {
                previousTag = tags[currentIdx + 1].name;
              } else if (tags.length > 1) {
                previousTag = tags[0].name === tag ? tags[1]?.name : tags[0].name;
              }
            } catch (error) {
              core.info(`Could not determine previous tag: ${error.message}`);
            }

            let changelog = '';
            try {
              const params = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
              };
              if (previousTag) {
                params.previous_tag_name = previousTag;
              }

              const { data } = await github.rest.repos.generateReleaseNotes(params);
              changelog = data.body;
            } catch (error) {
              core.warning(`Could not generate release notes: ${error.message}`);
              changelog = `Release ${tag}`;
            }

            const lines = changelog.split('\n').map(line => line.trimRight());
            const sections = [];
            let currentHeading = '';
            let currentItems = [];
            const ignoredHeadings = new Set(["what's changed", 'new contributors']);

            const cleanItem = (line) => line
              .replace(/^\* /, '- ')
              .replace(/ by @[\w-]+ in .+$/, '')
              .replace(/\*\*/g, '')
              .trim();

            const flushSection = () => {
              if (currentItems.length === 0) {
                currentHeading = '';
                return;
              }

              sections.push({
                heading: currentHeading,
                items: [...currentItems],
              });
              currentHeading = '';
              currentItems = [];
            };

            for (const line of lines) {
              if (line.startsWith('## ')) {
                flushSection();
                const heading = line.replace(/^## /, '').trim();
                currentHeading = ignoredHeadings.has(heading.toLowerCase()) ? '' : heading;
                continue;
              }

              if (line.startsWith('* ')) {
                currentItems.push(cleanItem(line));
              }
            }

            flushSection();

            const cappedSections = [];
            let totalItems = 0;
            const maxItems = 15;

            for (const section of sections) {
              if (totalItems >= maxItems) {
                break;
              }

              const remaining = maxItems - totalItems;
              const items = section.items.slice(0, remaining);
              if (items.length === 0) {
                continue;
              }

              cappedSections.push({
                heading: section.heading,
                items,
              });
              totalItems += items.length;
            }

            const updaterNotes = cappedSections.length > 0
              ? cappedSections
                  .map(section => {
                    const output = [];
                    if (section.heading) {
                      output.push(`${section.heading}:`);
                    }
                    output.push(...section.items);
                    return output.join('\n');
                  })
                  .join('\n\n')
              : `Release ${tag}`;

            core.setOutput('notes', updaterNotes);
            core.setOutput('changelog', changelog);

      - name: Ensure reusable draft release
        if: ${{ !inputs.dry_run }}
        id: ensure_release
        uses: actions/github-script@v8
        env:
          CHANGELOG: ${{ steps.notes.outputs.changelog }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.TAG_NAME;
            const version = process.env.VERSION;
            const changelog = process.env.CHANGELOG || '';

            const body = [
              changelog,
              '',
              '---',
              '',
              '## Download',
              '',
              '| Platform | File | Notes |',
              '|----------|------|-------|',
              '| **Windows (64-bit)** | `Grafyn_*_x64-setup.exe` | Most Windows PCs |',
              '| **Windows (ARM)** | `Grafyn_*_arm64-setup.exe` | Surface Pro X, Snapdragon laptops |',
              '| **macOS** | `Grafyn_*_aarch64.dmg` | M1/M2/M3/M4 Macs (also runs on Intel via Rosetta 2) |',
              '| **Linux (Debian/Ubuntu)** | `grafyn_*_amd64.deb` | `sudo dpkg -i` to install |',
              '| **Linux (Universal)** | `grafyn_*_amd64.AppImage` | `chmod +x` and run — works on any distro |',
              '',
              '> **Already installed?** Grafyn will prompt you to update automatically.',
              '>',
              '> Files ending in `.sig`, `.zip`, or `latest.json` are for auto-update — you do not need to download those.',
            ].join('\n');

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const matching = releases.filter(release => release.tag_name === tag);

            if (matching.length > 1) {
              core.setFailed(
                `Found ${matching.length} releases for ${tag}. Clean up duplicate drafts before retrying.`,
              );
              return;
            }

            if (matching.length === 1) {
              const release = matching[0];
              if (!release.draft) {
                core.setFailed(
                  `A published release already exists for ${tag}. Cut a new version instead of reusing this tag.`,
                );
                return;
              }

              const assets = await github.paginate(github.rest.repos.listReleaseAssets, {
                owner,
                repo,
                release_id: release.id,
                per_page: 100,
              });

              for (const asset of assets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: asset.id,
                });
              }

              const { data: updated } = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                tag_name: tag,
                name: `Grafyn v${version}`,
                body,
                draft: true,
                prerelease: false,
              });

              core.setOutput('created_new', 'false');
              core.setOutput('release_id', String(updated.id));
              return;
            }

            const { data: created } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `Grafyn v${version}`,
              body,
              draft: true,
              prerelease: false,
            });

            core.setOutput('created_new', 'true');
            core.setOutput('release_id', String(created.id));

  build:
    needs: prepare-release
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            os_name: windows
          - platform: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
            os_name: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
            os_name: macos
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            os_name: linux

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.100.0
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('frontend/src-tauri/Cargo.lock', '.github/workflows/release.yml') }}-${{ env.RUST_CACHE_VERSION }}

      - name: Install Linux dependencies
        if: matrix.os_name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate and regenerate icons
        working-directory: frontend
        shell: bash
        run: |
          if node -e "
            const fs = require('fs');
            const ico = 'src-tauri/icons/icon.ico';
            if (!fs.existsSync(ico)) process.exit(1);
            const magic = fs.readFileSync(ico).slice(0, 4).toString('hex');
            console.log('icon.ico magic: ' + magic);
            if (magic !== '00000100') process.exit(1);
          "; then
            echo "Icons are valid"
          else
            echo "Regenerating icons..."
            node scripts/generate-icons.cjs
            npx tauri icon src-tauri/icons/app-icon.png
          fi

      - name: Build MCP binary
        working-directory: frontend
        run: node scripts/prepare-sidecar.cjs --release --locked --target ${{ matrix.target }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} -- --locked
          releaseId: ${{ needs.prepare-release.outputs.release_id || '' }}
          tagName: ${{ needs.prepare-release.outputs.tag_name || '' }}
          releaseDraft: true
          releaseBody: ${{ needs.prepare-release.outputs.release_notes || '' }}
          uploadUpdaterJson: false
          updaterJsonPreferNsis: true

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p collected-assets
          BUNDLE_DIR="frontend/src-tauri/target/${{ matrix.target }}/release/bundle"
          find "$BUNDLE_DIR" -type f \( \
            -name "*.exe" -o -name "*.dmg" -o -name "*.deb" \
            -o -name "*.AppImage" -o -name "*.tar.gz" \
            -o -name "*.sig" -o -name "*.zip" \
          \) -exec cp {} collected-assets/ \;
          echo "Collected artifacts:"
          ls -la collected-assets/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.os_name }}-${{ matrix.arch }}
          path: collected-assets/
          retention-days: 1

  verify-release-assets:
    needs: [prepare-release, build]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: release

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Validate updater payload completeness
        shell: bash
        env:
          RELEASE_NOTES: ${{ needs.prepare-release.outputs.release_notes }}
          WORKER_URL: ${{ vars.CLOUDFLARE_WORKER_URL || 'https://grafyn-updater.grafyn-updater.workers.dev' }}
        run: |
          notes_file="$RUNNER_TEMP/release-notes.txt"
          printf '%s' "$RELEASE_NOTES" > "$notes_file"

          node frontend/scripts/generate-updater-manifest.cjs \
            --assets-dir release-assets \
            --version "${{ needs.prepare-release.outputs.version }}" \
            --worker-url "$WORKER_URL" \
            --notes-file "$notes_file" \
            --out release-assets/latest.json

  publish-release:
    needs: [prepare-release, build, verify-release-assets]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release

    steps:
      - name: Publish release
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
            });

  upload-to-r2:
    needs: [prepare-release, build, publish-release]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: release

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: release-assets-*
          merge-multiple: true

      - name: Read published release timestamp
        id: release_meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          published_at=$(gh release view "${{ needs.prepare-release.outputs.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json publishedAt \
            --jq .publishedAt)
          echo "published_at=$published_at" >> "$GITHUB_OUTPUT"

      - name: Generate canonical updater manifest
        shell: bash
        env:
          RELEASE_NOTES: ${{ needs.prepare-release.outputs.release_notes }}
          WORKER_URL: ${{ vars.CLOUDFLARE_WORKER_URL || 'https://grafyn-updater.grafyn-updater.workers.dev' }}
        run: |
          notes_file="$RUNNER_TEMP/release-notes.txt"
          printf '%s' "$RELEASE_NOTES" > "$notes_file"

          node frontend/scripts/generate-updater-manifest.cjs \
            --assets-dir release-assets \
            --version "${{ needs.prepare-release.outputs.version }}" \
            --worker-url "$WORKER_URL" \
            --pub-date "${{ steps.release_meta.outputs.published_at }}" \
            --notes-file "$notes_file" \
            --out release-assets/latest.json

      - name: Upload release assets to R2
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VERSION: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          npm i -g wrangler@3

          upload_with_retry() {
            local source_file="$1"
            local bucket_key="$2"
            local content_type="${3:-}"
            local attempt=1
            local max_attempts=3
            local delay=5

            while [ "$attempt" -le "$max_attempts" ]; do
              echo "Uploading ${bucket_key} (attempt ${attempt}/${max_attempts})"
              if [ -n "$content_type" ]; then
                if wrangler r2 object put "$bucket_key" --file "$source_file" --content-type "$content_type"; then
                  return 0
                fi
              else
                if wrangler r2 object put "$bucket_key" --file "$source_file"; then
                  return 0
                fi
              fi

              if [ "$attempt" -eq "$max_attempts" ]; then
                break
              fi

              sleep "$delay"
              delay=$((delay * 3))
              attempt=$((attempt + 1))
            done

            echo "ERROR: failed to upload ${bucket_key}" >&2
            return 1
          }

          upload_with_retry release-assets/latest.json "grafyn-releases/latest.json" application/json
          upload_with_retry release-assets/latest.json "grafyn-releases/${VERSION}/latest.json" application/json

          for file in release-assets/*; do
            filename="$(basename "$file")"
            if [ "$filename" = "latest.json" ]; then
              continue
            fi

            upload_with_retry "$file" "grafyn-releases/${VERSION}/${filename}"
          done

      - name: Verify updater endpoint
        env:
          EXPECTED_VERSION: ${{ needs.prepare-release.outputs.version }}
          WORKER_URL: ${{ vars.CLOUDFLARE_WORKER_URL || 'https://grafyn-updater.grafyn-updater.workers.dev' }}
        run: |
          sleep 5
          node <<'NODE'
          const fs = require('fs')

          async function main() {
            const expectedManifest = JSON.parse(fs.readFileSync('release-assets/latest.json', 'utf8'))
            const response = await fetch(`${process.env.WORKER_URL}/latest.json`)

            if (!response.ok) {
              throw new Error(`updater endpoint returned ${response.status}`)
            }

            const actualManifest = await response.json()
            if (actualManifest.version !== process.env.EXPECTED_VERSION) {
              throw new Error(
                `expected updater version ${process.env.EXPECTED_VERSION} but received ${actualManifest.version}`,
              )
            }

            if (JSON.stringify(actualManifest) !== JSON.stringify(expectedManifest)) {
              throw new Error('served latest.json does not match the generated manifest')
            }

            console.log(`Updater endpoint verified for version ${actualManifest.version}`)
          }

          main().catch((error) => {
            console.error(error.message)
            process.exit(1)
          })
          NODE

      - name: Deploy Cloudflare Worker
        working-directory: .cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

  cleanup-draft:
    needs: [prepare-release, build, verify-release-assets, publish-release]
    if: always() && !inputs.dry_run && needs.prepare-release.result == 'success' && needs.prepare-release.outputs.created_new == 'true' && (needs.build.result != 'success' || needs.verify-release-assets.result != 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release

    steps:
      - name: Delete failed draft release
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.deleteRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
            });

  build-summary:
    needs: [prepare-release, build, verify-release-assets, publish-release, upload-to-r2, cleanup-draft]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build summary
        run: |
          echo "## Release Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prepare release | ${{ needs.prepare-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build matrix | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Verify release assets | ${{ needs.verify-release-assets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish release | ${{ needs.publish-release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload to R2 | ${{ needs.upload-to-r2.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup draft | ${{ needs.cleanup-draft.result }} |" >> $GITHUB_STEP_SUMMARY
