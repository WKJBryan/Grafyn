version: 2
updates:
  - package-ecosystem: cargo
    directory: /frontend/src-tauri
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 3
    groups:
      rust-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 3
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 3
    groups:
      actions-all:
        patterns:
          - "*"
